openapi: 3.0.0
info:
  title: Notibot API
  version: 0.0.1
  description: Servicio de notificaciones vía WhatsApp y Telegram mediante encolamiento (Bull) y websockets.
servers:
  - url: "{{notibot_host}}"
    description: Main server host

paths:
  /api/v1/notifications/telegram/send:
    post:
      summary: Send Telegram notification
      tags:
        - Telegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramNotificationRequest'
      responses:
        '200':
          description: Notificación enviada con éxito

  /api/v1/notifications/whatsapp/send/single:
    post:
      summary: Send single WhatsApp message
      tags:
        - WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsAppSingleRequest'
      responses:
        '202':
          description: Envío en segundo plano en curso

  /api/v1/notifications/whatsapp/send/diffusion:
    post:
      summary: Send WhatsApp diffusion
      tags:
        - WhatsApp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsAppDiffusionRequest'
      responses:
        '202':
          description: Envío en segundo plano en curso

  /api/v1/notifications/whatsapp/agent/available:
    get:
      summary: Get available agents
      tags:
        - WhatsApp
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of available agents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v1/notifications/whatsapp/session/end/{phone}:
    delete:
      summary: End WhatsApp session
      tags:
        - WhatsApp Session
      security:
        - bearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session ended successfully

  /api/v1/notifications/whatsapp/session/init/{phone}:
    get:
      summary: Initialize WhatsApp session
      tags:
        - WhatsApp Session
      security:
        - bearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session initialized successfully

  /api/v1/notifications/whatsapp/session/qr/{phone}:
    get:
      summary: Get QR Code for session
      tags:
        - WhatsApp Session
      security:
        - bearerAuth: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: QR code ready
        '404':
          description: QR code not ready yet

  /api/v1/events/create:
    post:
      summary: Create an event
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [ALERTA, INFO]
                ownerId:
                  type: string
                ownerDomain:
                  type: string
      responses:
        '201':
          description: Event created successfully

  /api/v1/events/subscribe:
    post:
      summary: Subscribe to an event
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                eventId:
                  type: string
      responses:
        '200':
          description: Subscribed successfully

  /api/v1/observability/logs/list:
    get:
      summary: List log files
      tags:
        - Observability
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of log files

  /api/v1/observability/logs/file/{name}:
    get:
      summary: Get log file content
      tags:
        - Observability
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log file content
    delete:
      summary: Delete log file
      tags:
        - Observability
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log file deleted

  /api/v1/observability/logs/download/{name}:
    get:
      summary: Download log file
      tags:
        - Observability
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download

  /api/v1/observability/logs/delete-all:
    delete:
      summary: Delete all log files
      tags:
        - Observability
      responses:
        '200':
          description: All logs deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TelegramNotificationRequest:
      type: object
      properties:
        phone:
          type: string
        payload:
          $ref: '#/components/schemas/NotificationPayload'

    WhatsAppSingleRequest:
      type: object
      properties:
        phone:
          type: string
        agent:
          type: string
        payload:
          $ref: '#/components/schemas/NotificationPayload'

    WhatsAppDiffusionRequest:
      type: object
      properties:
        phones:
          type: array
          items:
            type: string
        agents:
          type: array
          items:
            type: string
        message:
          $ref: '#/components/schemas/NotificationPayload'
        options:
          type: object
          properties:
            delay:
              type: integer
              description: Delay in ms

    NotificationPayload:
      type: object
      properties:
        meta:
          type: object
          properties:
            title:
              type: string
            type:
              type: string
        body:
          type: object
          additionalProperties:
            type: string
        footer:
          type: string
